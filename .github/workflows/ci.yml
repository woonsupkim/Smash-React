name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (simulator math, engines, credible intervals)
        run: npm test -- --watchAll=false
        env:
          CI: true

      - name: Pipeline parser tests (ESPN schedule -> roster matching)
        run: node --test data-pipeline/lib/

      - name: Production build
        run: npm run build
        env:
          CI: false # treat CRA build warnings as warnings, not errors
