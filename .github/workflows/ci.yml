name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint (same rule set the CRA builds enforced)
        run: npm run lint

      - name: Unit tests (simulator math, engines, credible intervals)
        run: npm test

      - name: Pipeline parser tests (ESPN schedule -> roster matching)
        run: node --test data-pipeline/lib/

      - name: Production build (vite)
        run: npm run build

      - name: E2E smoke tests (five key pages against the real bundle)
        run: |
          npx playwright install --with-deps chromium
          npm run e2e
