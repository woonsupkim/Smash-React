name: Retune blend weights

# Runs just before each grand slam (and on demand from the Actions tab).
# Re-fits the Smart Blend weights on the season-to-date track record and
# opens a PULL REQUEST rather than committing: every model change gets a
# human review, a version bump, and a changelog entry before it ships.
#
# Merging the PR changes the model fingerprint in engineConfig.json, so the
# next daily refresh re-simulates the full track record with the new weights
# automatically (see modelKey in data-pipeline/buildTrackRecord.js).
on:
  workflow_dispatch: {}
  # ~4-7 days before play starts at each slam, 05:00 UTC (an hour ahead of
  # the daily data refresh). Dates shift a little year to year; these sit
  # safely inside the pre-tournament week.
  schedule:
    - cron: '0 5 10 1 *'   # before the Australian Open
    - cron: '0 5 20 5 *'   # before the French Open
    - cron: '0 5 24 6 *'   # before Wimbledon
    - cron: '0 5 20 8 *'   # before the US Open

permissions:
  contents: write
  pull-requests: write

jobs:
  retune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: npm ci --legacy-peer-deps

      # The raw match caches (saved by the refresh workflow) power the bench
      # trials below. restore-keys prefix-matches the newest cache; if none
      # exists the bench step degrades gracefully.
      - name: Restore raw match-history cache
        uses: actions/cache/restore@v4
        with:
          path: data-pipeline/raw
          key: raw-matches-${{ github.run_id }}
          restore-keys: |
            raw-matches-

      - name: Retune weights on the season-to-date record
        id: tune
        run: |
          node data-pipeline/tuneWeights.js | tee tune.log
          # -I ignores the tunedAt timestamp line, which the tuner rewrites on
          # every run - a PR should open only when weights or calibration
          # actually moved.
          if git diff --quiet -I'"tunedAt"' src/engineConfig.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Weights and calibration unchanged - no PR needed."
            git checkout -- src/engineConfig.json
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Bench revalidation: rerun the frontier trials (form-tilted Elo,
      # common-opponent, PageRank, dominance) on fresh data so the PR carries
      # their up-to-date verdicts. Promotion stays a human decision; this
      # just makes the evidence free. Non-fatal by design - a missing raw
      # cache should never block a retune.
      - name: Bench trials (frontier2 on the walk-forward harness)
        if: steps.tune.outputs.changed == 'true'
        continue-on-error: true
        run: |
          if [ ! -f data-pipeline/raw/player-id-map.json ]; then
            echo "No raw match cache restored - skipping bench trials." | tee bench.log
            exit 0
          fi
          LITE=1 node data-pipeline/experiments.js precompute
          node data-pipeline/experiments.js frontier2 | tee bench.log

      - name: Open a pull request with the new weights
        if: steps.tune.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="retune-weights-$(date -u +%Y%m%d)"
          git config user.name "smash-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add src/engineConfig.json
          git commit -m "Retune Smart Blend weights (pre-slam)"
          git push -u origin "$BRANCH"
          {
            echo "Pre-slam retune of the Smart Blend weights, fit on the season-to-date track record."
            echo
            echo '```'
            cat tune.log
            echo '```'
            echo
            if [ -s bench.log ]; then
              echo "<details><summary><b>Bench revalidation</b> (form-tilted Elo, common-opponent, PageRank, dominance - walk-forward)</summary>"
              echo
              echo '```'
              cat bench.log
              echo '```'
              echo
              echo "Promotion rule: a bench engine earns a production slot only if it beats every incumbent in a cell on BOTH accuracy and log loss with a coherent story. See src/pages/ModelCard.js and data-pipeline/experiments.js (frontier2)."
              echo "</details>"
              echo
            fi
            echo "**Before merging:** bump \`MODEL_VERSION\` and add a changelog entry in \`src/data/changelog.js\`."
            echo "**After merging:** the model fingerprint changes, so the next daily refresh re-simulates the full track record with these weights automatically."
          } > pr-body.md
          gh pr create --title "Pre-slam retune: Smart Blend weights" --body-file pr-body.md --base main --head "$BRANCH"
