name: Refresh player stats

# Triggered three ways: daily on a schedule during grand slam windows (below),
# manually from the Home page's "Update Data" button (via
# api/trigger-refresh.js), or directly from the GitHub Actions tab. Runs the
# full data-pipeline refresh and commits the regenerated CSVs/h2h.json back
# to main, which triggers a Vercel redeploy. Doing this in a GitHub Action
# (rather than inside the Vercel serverless function) sidesteps Vercel's
# function execution time limits - a full refresh across ~50 players can
# take several minutes.
on:
  workflow_dispatch: {}
  # Daily at 06:00 UTC, but only inside generous windows around each slam
  # (cron can't span month boundaries, so slams that straddle one get two
  # entries). Exact tournament dates shift a little year to year; the
  # windows are padded so they stay covered without annual edits. Outside
  # these windows the refresh stays manual-only.
  schedule:
    - cron: '0 6 8-31 1 *'    # Australian Open: Jan 8-31
    - cron: '0 6 1-2 2 *'     # Australian Open spillover: Feb 1-2
    - cron: '0 6 18-31 5 *'   # French Open: May 18-31
    - cron: '0 6 1-10 6 *'    # French Open: Jun 1-10
    - cron: '0 6 22-30 6 *'   # Wimbledon: Jun 22-30
    - cron: '0 6 1-15 7 *'    # Wimbledon: Jul 1-15
    - cron: '0 6 18-31 8 *'   # US Open: Aug 18-31
    - cron: '0 6 1-15 9 *'    # US Open: Sep 1-15
    # Combined ATP/WTA 1000s (forward test covers these too; windows padded
    # for year-to-year date drift, and Madrid-Rome runs into the French
    # window / Canada-Cincinnati into the US Open window for continuous
    # daily coverage across each swing)
    - cron: '0 6 1-20 3 *'    # Indian Wells: Mar 1-20
    - cron: '0 6 21-31 3 *'   # Miami: Mar 21-31
    - cron: '0 6 1-6 4 *'     # Miami spillover: Apr 1-6
    - cron: '0 6 20-30 4 *'   # Madrid: Apr 20-30
    - cron: '0 6 1-17 5 *'    # Madrid finish + Rome: May 1-17
    - cron: '0 6 25-31 7 *'   # Canada: Jul 25-31
    - cron: '0 6 1-17 8 *'    # Canada finish + Cincinnati: Aug 1-17
    # Off-season heartbeat: Mondays year-round. Keeps the stats current with
    # non-slam tournaments (the summer hard-court swing feeds the US Open
    # model), re-prices the projected title odds, grows the season track
    # record, and lands the same day the weekly recap share card generates.
    # On Mondays inside a slam window this fires alongside the daily cron;
    # the concurrency group below serializes the two, and the second run is
    # cheap (the fetch cache is under 24h old, so it skips every player).
    - cron: '0 6 * * 1'       # Off-season: every Monday

# The default GITHUB_TOKEN is read-only on contents unless explicitly
# elevated - without this, the final "git push" step fails with exit 1.
# issues: write lets the failure step below open an alert issue.
permissions:
  contents: write
  issues: write

# Never run two refreshes at once (e.g. a slam-window Monday triggers both
# crons, or a manual dispatch lands mid-run): queue instead of overlapping,
# so the commit/push step never races itself.
concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      # --legacy-peer-deps: an unrelated optional peer (@sveltejs/kit, only
      # used by @vercel/analytics' Svelte integration, which this project
      # doesn't use) otherwise makes plain `npm ci` fail with an ERESOLVE
      # conflict - same issue hit installing locally.
      - run: npm ci --legacy-peer-deps

      # Persist the raw match-history caches (both tours) across runs.
      # data-pipeline/raw is gitignored - too big and churny for the repo -
      # so without this every run starts cold and re-downloads ~1,000 stat
      # pages from the API (the old 1.5-hour fetch phase). With it, the
      # incremental fetch pulls only what's new (1-2 pages per player) and
      # player history ACCUMULATES across runs instead of being rebuilt from
      # each player's newest-300 window. Cache keys are immutable, so each
      # run restores the most recent cache (restore-keys prefix match) and
      # saves an updated one under its own run id when the job succeeds.
      - name: Restore raw match-history cache
        uses: actions/cache@v4
        with:
          path: data-pipeline/raw
          key: raw-matches-${{ github.run_id }}
          restore-keys: |
            raw-matches-

      - name: Refresh stats (fetch + recompute + rebuild CSVs)
        run: npm run refresh-stats
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

      - name: Rebuild upset-scenario CSVs
        run: npm run build-upset-csv
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

      - name: Fetch any missing player headshots
        run: npm run fetch-images
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

      - name: Refresh women's (WTA) stats (fetch + recompute + rebuild CSVs)
        run: npm run refresh-stats-women
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

      - name: Rebuild women's upset-scenario CSVs
        run: npm run build-upset-csv-women
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

      - name: Fetch any missing women's player headshots
        run: npm run fetch-images-women
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

      # Surface Elo form ratings (both tours) - the live H2H blends these
      # with the point simulation.
      - name: Compute Elo form ratings
        run: npm run compute-elo

      # Must run LAST - it re-simulates every completed 2026 match using the
      # freshly-rebuilt surface + upset CSVs and the newly-fetched match
      # caches (and replays Elo), so the Track Record page picks up new
      # results automatically.
      - name: Rebuild Track Record (precomputed predictions)
        run: npm run build-track-record

      # Prior-season components for the rolling-window tuner (the retune
      # workflow reads this committed artifact - it has no raw data itself).
      - name: Build tuner history
        run: npm run build-tuner-history

      # Forward test: grade any locked predictions whose results have landed,
      # then lock new ones for upcoming matches.
      - name: Update forward predictions
        run: npm run build-predictions

      # Model guardrails: per tour x surface, compare the deployed engine's
      # recent accuracy against the season, the rankings baseline, and a coin
      # flip. Writes public/data/guardrails.json; a later step opens an alert
      # issue if anything tripped.
      - name: Check model guardrails
        run: npm run check-guardrails

      # Sitemap + robots: enumerate every match and player page for crawlers.
      # Runs after build-predictions so new match pages are included.
      - name: Build sitemap
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: npm run build-sitemap

      # Weekly email digest: Mondays only, matching the off-season heartbeat
      # cron. Send is optional - without RESEND_API_KEY/DIGEST_TO it just
      # writes public/data/digest.html + digest.txt.
      - name: Build and send weekly digest (Mondays)
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
          DIGEST_FROM: ${{ secrets.DIGEST_FROM }}
        run: |
          if [ "$(date -u +%u)" = "1" ]; then npm run build-digest; else echo "Not Monday; skipping digest."; fi

      # The four generators below are presentation layers over data that is
      # already computed. continue-on-error on each: a sharp/ffmpeg crash in
      # a card render must not discard the whole successful refresh sitting
      # uncommitted behind it (yesterday's cosmetic files simply persist).
      # The alert step after the commit still opens an issue when any of
      # them failed, so nothing rots silently.

      # Championship odds: simulate the live slam draw to completion and
      # append today's snapshot to the odds history.
      - name: Compute championship title odds
        id: title_odds
        continue-on-error: true
        run: npm run build-title-odds

      # The day's shareable artifact: yesterday's scorecard + upset watch.
      - name: Build the daily scorecard
        id: scorecard
        continue-on-error: true
        run: npm run build-daily-scorecard

      # The share kit: Instagram-format prediction cards (carousel + story)
      # in public/data/share/, each with a ready caption in manifest.json.
      # sharp is installed here rather than kept in package.json (a local
      # file lock prevents committing it as a dependency); fonts-barlow gives
      # the cards the app's own condensed display face.
      - name: Generate shareable assets
        id: share_assets
        continue-on-error: true
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          sudo apt-get install -y --no-install-recommends fonts-barlow > /dev/null 2>&1 || true
          npm install --no-save sharp
          npm run build-share-assets

      # Animated assets (title-odds race, countdown) - ffmpeg ships on the
      # runner. Skips itself when there's nothing to animate.
      - name: Generate motion assets
        id: motion_assets
        continue-on-error: true
        run: npm run build-motion-assets

      # The full run takes a while; if main moved in the meantime (a normal
      # push during a slam), a plain push is rejected as non-fast-forward.
      # Rebase our single data commit on top of the new head, retrying once
      # in case of a push race.
      - name: Commit refreshed data
        run: |
          git config user.name "smash-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data public/sitemap.xml public/robots.txt data-pipeline/output src/assets/players src/assets/players-women
          git diff --cached --quiet && exit 0
          git commit -m "Automated data refresh"
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "Push attempt $attempt failed; retrying..."
            sleep 15
          done
          echo "Could not push after 3 attempts" >&2
          exit 1

      # Image-centric autopost: hands the day's best share cards (cover,
      # results, moments) to a Buffer/Zapier/Make-style webhook. Runs AFTER
      # the commit so the posted imageUrls are live once Vercel deploys.
      # Without the secret it dry-runs and no-ops.
      - name: Post share cards to autopost webhook (optional)
        continue-on-error: true
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          AUTOPOST_WEBHOOK_URL: ${{ secrets.AUTOPOST_WEBHOOK_URL }}
        run: npm run post-social

      # Optional publicity: if a SOCIAL_WEBHOOK_URL secret is configured (a
      # Slack/Discord/Zapier-style JSON webhook), post the day's scorecard
      # text after a successful refresh. With no secret the step is a no-op,
      # so nothing is ever published unless you explicitly wire it up.
      - name: Post daily scorecard to webhook (optional)
        env:
          WEBHOOK: ${{ secrets.SOCIAL_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK" ]; then echo "No SOCIAL_WEBHOOK_URL configured; skipping."; exit 0; fi
          # text/content: the scorecard one-liner (Slack/Discord render those
          # keys directly). thread: the ready-to-paste slate thread from the
          # share manifest, for consumers that publish multi-post threads.
          PAYLOAD=$(node -e "
            const sc = require('./public/data/daily_scorecard.json');
            let thread = null;
            try { thread = require('./public/data/share/manifest.json').thread || null; } catch {}
            console.log(JSON.stringify({ text: sc.postText, content: sc.postText, thread }));
          ")
          curl -s -X POST -H 'Content-Type: application/json' \
            -d "$PAYLOAD" "$WEBHOOK" || echo "Webhook post failed (non-fatal)."

      # Model quality alert: if any guardrail tripped (a tour x surface cell
      # or the forward test going cold), open an issue so it gets seen. Same
      # dedupe pattern as the failure alert below - one open issue collects
      # daily updates instead of piling up duplicates.
      - name: Open an issue if a model guardrail tripped
        # Alerting is best-effort: a gh API blip after a successful refresh
        # must not mark the whole (already pushed) run as failed.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ALERTS=$(node -e "try { const g = require('./public/data/guardrails.json'); console.log((g.alerts || []).join('\n')); } catch {}")
          if [ -z "$ALERTS" ]; then echo "All model guardrails green."; exit 0; fi
          TITLE="Model guardrail alert"
          BODY="One or more accuracy guardrails tripped on $(date -u +%Y-%m-%d):

          $ALERTS

          Details: public/data/guardrails.json in the latest data commit. Run log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number' --repo "${{ github.repository }}")
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY" --repo "${{ github.repository }}"
          else
            gh issue create --title "$TITLE" --body "$BODY" --repo "${{ github.repository }}"
          fi

      # The cosmetic generators are continue-on-error so a card-render crash
      # can't discard the data commit - but their failures still surface here.
      - name: Open an issue if a cosmetic generator failed
        if: steps.title_odds.outcome == 'failure' || steps.scorecard.outcome == 'failure' || steps.share_assets.outcome == 'failure' || steps.motion_assets.outcome == 'failure'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="Cosmetic generator failed in data refresh"
          BODY="The data refresh committed fine, but a presentation step failed on $(date -u +%Y-%m-%d): title_odds=${{ steps.title_odds.outcome }}, scorecard=${{ steps.scorecard.outcome }}, share_assets=${{ steps.share_assets.outcome }}, motion_assets=${{ steps.motion_assets.outcome }}. See the run log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number' --repo "${{ github.repository }}")
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY" --repo "${{ github.repository }}"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label bug --repo "${{ github.repository }}" || \
            gh issue create --title "$TITLE" --body "$BODY" --repo "${{ github.repository }}"
          fi

      # Fail loudly and privately: a broken refresh during a slam should open
      # an issue (which GitHub emails to watchers), never rot silently while
      # the site serves stale data. Reuses an existing open alert instead of
      # piling up duplicates when a failure repeats daily.
      - name: Open an issue if the refresh failed
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="Data refresh failed"
          BODY="The scheduled/manual data refresh failed on $(date -u +%Y-%m-%d). See the run log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number' --repo "${{ github.repository }}")
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY" --repo "${{ github.repository }}"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label bug --repo "${{ github.repository }}" || \
            gh issue create --title "$TITLE" --body "$BODY" --repo "${{ github.repository }}"
          fi
