name: Refresh player stats

# Triggered three ways: daily on a schedule during grand slam windows (below),
# manually from the Home page's "Update Data" button (via
# api/trigger-refresh.js), or directly from the GitHub Actions tab. Runs the
# full data-pipeline refresh and commits the regenerated CSVs/h2h.json back
# to main, which triggers a Vercel redeploy. Doing this in a GitHub Action
# (rather than inside the Vercel serverless function) sidesteps Vercel's
# function execution time limits — a full refresh across ~50 players can
# take several minutes.
on:
  workflow_dispatch: {}
  # Daily at 06:00 UTC, but only inside generous windows around each slam
  # (cron can't span month boundaries, so slams that straddle one get two
  # entries). Exact tournament dates shift a little year to year; the
  # windows are padded so they stay covered without annual edits. Outside
  # these windows the refresh stays manual-only.
  schedule:
    - cron: '0 6 8-31 1 *'    # Australian Open: Jan 8-31
    - cron: '0 6 1-2 2 *'     # Australian Open spillover: Feb 1-2
    - cron: '0 6 18-31 5 *'   # French Open: May 18-31
    - cron: '0 6 1-10 6 *'    # French Open: Jun 1-10
    - cron: '0 6 22-30 6 *'   # Wimbledon: Jun 22-30
    - cron: '0 6 1-15 7 *'    # Wimbledon: Jul 1-15
    - cron: '0 6 18-31 8 *'   # US Open: Aug 18-31
    - cron: '0 6 1-15 9 *'    # US Open: Sep 1-15

# The default GITHUB_TOKEN is read-only on contents unless explicitly
# elevated — without this, the final "git push" step fails with exit 1.
permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # --legacy-peer-deps: an unrelated optional peer (@sveltejs/kit, only
      # used by @vercel/analytics' Svelte integration, which this project
      # doesn't use) otherwise makes plain `npm ci` fail with an ERESOLVE
      # conflict — same issue hit installing locally.
      - run: npm ci --legacy-peer-deps

      - name: Refresh stats (fetch + recompute + rebuild CSVs)
        run: npm run refresh-stats
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

      - name: Rebuild upset-scenario CSVs
        run: npm run build-upset-csv
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

      - name: Fetch any missing player headshots
        run: npm run fetch-images
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

      - name: Refresh women's (WTA) stats (fetch + recompute + rebuild CSVs)
        run: npm run refresh-stats-women
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

      - name: Rebuild women's upset-scenario CSVs
        run: npm run build-upset-csv-women
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

      - name: Fetch any missing women's player headshots
        run: npm run fetch-images-women
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

      # Surface Elo form ratings (both tours) — the live H2H blends these
      # with the point simulation.
      - name: Compute Elo form ratings
        run: npm run compute-elo

      # Must run LAST — it re-simulates every completed 2026 match using the
      # freshly-rebuilt surface + upset CSVs and the newly-fetched match
      # caches (and replays Elo), so the Track Record page picks up new
      # results automatically.
      - name: Rebuild Track Record (precomputed predictions)
        run: npm run build-track-record

      # Forward test: grade any locked predictions whose results have landed,
      # then lock new ones for upcoming matches.
      - name: Update forward predictions
        run: npm run build-predictions

      - name: Commit refreshed data
        run: |
          git config user.name "smash-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data data-pipeline/output src/assets/players src/assets/players-women
          git diff --cached --quiet || git commit -m "Automated data refresh"
          git push
